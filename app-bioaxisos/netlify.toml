# Netlify deploy config for the BioaxisOS app.
# This file lives in app-bioaxisos/, so in the Netlify UI you MUST set
# "Base directory" = app-bioaxisos. Netlify then reads this file, and all paths
# below are relative to that base directory.
#
# Connect once: Add new project -> Import an existing project -> GitHub ->
# armandofalcon66/renuviamd-site -> Base directory: app-bioaxisos.

[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Required env vars (Netlify UI -> Site configuration -> Environment variables):
#   DATABASE_URL  - Supabase 'bioaxisos-test' pooled (transaction) string, port 6543
#   AUTH_SECRET   - 32+ char random: openssl rand -base64 32
#   APP_URL       - this site's URL (used for portal email links)
# Leave BAA_SIGNED unset -> synthetic-only mode (banner on, dev-login enabled).
# No DATABASE_CA_CERT needed for Supabase (TLS is built in).
