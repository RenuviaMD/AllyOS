  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}

  .demobar a.back{color:var(--muted);text-decoration:none;font-size:.85rem;margin-right:6px}
  .demobar a.book{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(120deg,var(--teal),var(--green));color:#04140e;font-weight:700;font-size:.85rem;text-decoration:none;padding:8px 15px;border-radius:9px;white-space:nowrap}
