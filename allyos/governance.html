<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Governance inspection · AllyOS · RenuviaMD®</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="ally-avatar-64.png">
<link rel="stylesheet" href="allyos-theme.css">
<style>
 body.allyos{font-family:var(--fbody)}
 .top{display:flex;align-items:center;gap:14px;padding:0 20px;height:54px;background:#0a1120cc;backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
 .brand{font-family:var(--fdisp);font-weight:900}.brand b{color:var(--teal)}
 .tag{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);border:1px solid var(--line2);border-radius:5px;padding:3px 8px}
 .top .right{margin-left:auto;font-size:12px;color:var(--muted)}.top .right a{color:var(--teal);text-decoration:none;margin-left:10px}
 .wrap{max-width:1000px;margin:0 auto;padding:18px 20px 100px}
 h1{font-family:var(--fdisp);font-weight:900;font-size:1.5rem;margin:0}
 .sub{color:var(--muted);font-size:.9rem;margin:3px 0 0}
 .stages{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
 .stg{display:flex;align-items:center;gap:8px;padding:8px 13px;border-radius:9px;border:1px solid var(--line2);background:rgba(255,255,255,.02);color:var(--muted);font-size:12.5px;font-weight:700;cursor:pointer}
 .stg .n{display:inline-flex;width:18px;height:18px;border-radius:50%;background:#1a2636;align-items:center;justify-content:center;font-size:10px}
 .stg.on{border-color:var(--teal);background:linear-gradient(120deg,rgba(46,197,193,.14),rgba(46,197,193,.05));color:var(--ink)}
 .stg.done{color:var(--green)}.stg.done .n{background:#0e2a1f;color:var(--green)}
 .card{background:linear-gradient(180deg,#0f1c2e,#0c1626);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:12px 0}
 .grp{font-family:var(--fdisp);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:6px 0 10px;font-weight:700}
 .hgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 16px}@media(max-width:640px){.hgrid{grid-template-columns:1fr}}
 label{display:block;font-size:11px;color:var(--dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
 input,select,textarea{width:100%;background:#0a1422;border:1px solid var(--line2);border-radius:8px;color:var(--ink);font:inherit;font-size:13px;padding:8px 10px}
 input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.85);cursor:pointer}
 .drop{border:2px dashed var(--line2);border-radius:12px;padding:34px 18px;text-align:center;color:var(--muted);cursor:pointer;transition:.15s}
 .drop.hi{border-color:var(--teal);background:rgba(46,197,193,.06);color:var(--ink)}
 .drop .ic{font-size:26px;opacity:.8}
 .btn{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:9px;padding:10px 16px;font-weight:800;font-size:.86rem;cursor:pointer}
 .btn.go{background:linear-gradient(120deg,var(--teal),#19b9c9);color:#04121a}
 .btn.gold{background:linear-gradient(120deg,var(--gold,#b87913),#caa23e);color:#241a05}
 .btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--ink)}
 .btn:disabled{opacity:.45;cursor:not-allowed}
 .yn{display:flex;gap:6px}.yn button{font-size:11px;font-weight:800;border:1px solid var(--line2);background:#0a1422;color:var(--muted);border-radius:7px;padding:5px 12px;cursor:pointer}
 .yn button.y.on{background:#0e2a1f;border-color:#1e6e4a;color:var(--green)}.yn button.n.on{background:#2a1512;border-color:#8a322c;color:#f0b3aa}
 .stat{display:flex;gap:8px;align-items:center;padding:10px 0;border-top:1px solid var(--line);font-size:13px}.stat:first-child{border-top:none}.stat .lbl{flex:1}
 table{width:100%;border-collapse:collapse;font-size:12.5px}
 th{text-align:left;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:8px;border-bottom:1px solid var(--line2)}
 td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
 tr.pick{background:rgba(46,197,193,.06)}
 .rk{font-weight:800;font-size:11px}.rk.hi{color:#f0857d}.rk.md{color:var(--gold)}.rk.lo{color:var(--muted)}
 .flag{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:1px 6px;border-radius:4px;margin:1px;border:1px solid var(--line2);color:var(--muted)}
 .flag.dup{background:#2a1512;color:#f0b3aa;border-color:#8a322c}.flag.new{background:#0e2436;color:#4ea8e0;border-color:#2a5a7e}.flag.hem{background:#31220e;color:var(--gold);border-color:#4a3c18}.flag.hf{background:#2a1a30;color:#e59be5;border-color:#5a2f5a}
 .chip{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid var(--line2);color:var(--muted)}
 .chiprow{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
 .tabrow{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
 .ctab{padding:7px 12px;border-radius:9px;border:1px solid var(--line2);background:rgba(255,255,255,.02);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}
 .ctab.on{border-color:var(--gold);background:#211a0c;color:var(--gold)}.ctab.pass{border-color:#1e6e4a}.ctab.fail{border-color:#8a322c}
 .verdict{font-size:12px;font-weight:800;padding:3px 12px;border-radius:20px}
 .verdict.pass{background:#0e2a1f;color:var(--green);border:1px solid #1e6e4a}.verdict.fail{background:#2a1512;color:#f0b3aa;border:1px solid #8a322c}.verdict.pend{background:#1a222b;color:var(--muted);border:1px solid var(--line2)}
 .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0}
 .kpi{background:#0a1422;border:1px solid var(--line2);border-radius:10px;padding:12px;text-align:center}
 .kpi .v{font-family:var(--fdisp);font-size:1.5rem}.kpi.red .v{color:#f0857d}.kpi.gold .v{color:var(--gold)}.kpi.green .v{color:var(--green)}
 .pf{background:#12100a;border:1px solid #3a3117;border-radius:9px;padding:6px 12px;margin:6px 0;font-size:12.5px;color:#e8d9b0}
 .findbox{background:#0a1422;border:1px solid var(--line2);border-radius:9px;padding:10px 12px;margin:8px 0;font-size:12.5px}
 .findbox.def{border-color:#8a322c}.findbox.con{border-color:#4a3c18}
 .muted{color:var(--muted)}.note{font-size:11.5px;color:var(--dim);border:1px solid var(--line);border-radius:9px;padding:10px 13px;margin:10px 0;line-height:1.5}
 .navrow{display:flex;justify-content:space-between;margin-top:18px;gap:10px}
</style></head>
<body class="allyos">
<div class="top">
  <span class="brand"><b>Ally</b>OS</span><span class="tag">Governance inspection</span>
  <span class="right"><span id="clinicLbl"></span><a href="clinic-network.html">← Cockpit</a></span>
</div>
<div class="wrap">
  <h1>Live Governance Inspection</h1>
  <p class="sub" id="hdrSub">Wellness directorship · non-AHCA oversight · 4-stage encounter audit</p>

  <div class="stages" id="stages"></div>
  <div id="view"></div>
</div>

<input type="file" id="csvPick" accept=".csv,text/csv" style="display:none">
<input type="file" id="chartPick" accept="image/*,.pdf" multiple style="display:none">
<script src="allyos-auth.js"></script>
<script src="allyos-credentials.js"></script>
<script src="supabase-client.js"></script>
<script src="governance-report.js"></script>
<script>
if(window.AllyOSAuth){AllyOSAuth.guard(['provider','admin']);}
var sess=(window.AllyOSAuth&&AllyOSAuth.session())||{};
document.getElementById('clinicLbl').textContent=sess.clinic||'';
function esc(x){return(''+(x==null?'':x)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Note-only audit: strip any stale sentence that mentions a superbill/claim cross-check.
function narr(t){return(''+(t||'')).replace(/[^.!?]*\b(superbill|cross[- ]?check(?:ing)?|billed code[s]?|claim)\b[^.!?]*[.!?]/gi,'').replace(/\s{2,}/g,' ').trim();}

// Wellness compliance rubric per line (same parameters as the binder — no AHCA billing content).
var PARAMS={
  iv:['IV protocol','GFE before treatment','Aftercare instructions','Signed by authorized provider'],
  pep:['Peptide protocol','Provider signed','Peptide consent','Dose / schedule','Follow-up plan','Side-effect check'],
  bhrt:['POC / plan of care','Provider signed','Reason for treatment','Hormone consent','Labs / monitoring plan','Follow-up plan']
};
var STATUTORY=['Practitioner licenses active & unencumbered','Scope of practice within signed protocol','Adverse-incident reporting current','Biohazardous-waste plan on file & staff trained','Standing orders / GFE model current','Equipment adequacy/functionality — pump + emergency/resuscitation checked','Medical Director identification available'];

var CK='allyos_govinspect_v1';
function load(){try{return JSON.parse(localStorage.getItem(CK)||'null')||{};}catch(e){return {};}}
function save(){try{localStorage.setItem(CK,JSON.stringify(S));}catch(e){}}
var S=load();
S.stage=S.stage||1; S.statutory=S.statutory||{}; S.encounters=S.encounters||[]; S.selected=S.selected||[]; S.review=S.review||{}; S.hdr=S.hdr||{};
// Repair stale saved state: drop selections whose encounter is gone, and never boot into a
// review/summary stage with nothing to show (prevents landing on a blank Stage 3/4).
S.selected=S.selected.filter(function(id){for(var i=0;i<S.encounters.length;i++)if(S.encounters[i].id===id)return true;return false;});
// A "reading…" flag left over from a refresh has no request behind it — clear it so the row is recoverable.
S.encounters.forEach(function(e){if(e.parsing){e.parsing=false;if(!e.pt||e.pt==='…')e.pt='—';if(!(S.review[e.id]&&S.review[e.id].note))e.blank=true;else e.err='Interrupted — re-drop or ✕ to remove';}});
if(S.stage>=3&&!S.selected.length)S.stage=S.encounters.length?2:1;
if(!S.hdr.clinic&&sess.clinic)S.hdr.clinic=sess.clinic;

function normLine(t){t=(''+(t||'')).toLowerCase();if(/bhrt|hrt|horm|estr|test|progest/.test(t))return 'bhrt';if(/pep|glp|semag|tirzep|bpc|sermorel|ipamorel/.test(t))return 'pep';return 'iv';}
// Full name shows ON SCREEN for the MD's identification; e.pt (initials) is what goes to the report + archive.
function initialsOf(nm){var p=(''+(nm||'')).replace(/,/g,' ').trim().split(/\s+/).filter(Boolean);if(!p.length)return '';if(p.length===1)return (p[0][0]||'').toUpperCase()+'.';return ((p[0][0]||'')+'.'+(p[p.length-1][0]||'')+'.').toUpperCase();}
function dispPt(e){return (e&&e.name)?e.name:((e&&e.pt)||'—');}
// A YYYY-MM-DD (calendar picker) value prints as a readable date on the binder; other text passes through.
function fmtDate(d){d=''+(d||'');var m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(d);if(!m)return d;var MO=['January','February','March','April','May','June','July','August','September','October','November','December'];return MO[+m[2]-1]+' '+(+m[3])+', '+m[1];}
function num(x){var n=parseFloat((''+(x||'')).replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n;}

// ---- CSV parse (flexible column detection) ----
function parseCSV(txt){
  var rows=[];var i=0,f='',row=[],q=false;
  while(i<txt.length){var c=txt[i];
    if(q){if(c==='"'){if(txt[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}else if(c==='\n'||c==='\r'){if(f!==''||row.length){row.push(f);rows.push(row);row=[];f='';}if(c==='\r'&&txt[i+1]==='\n')i++;}else f+=c;}
    i++;}
  if(f!==''||row.length){row.push(f);rows.push(row);}
  return rows.filter(function(r){return r.some(function(x){return (''+x).trim();});});
}
function ingestCSV(txt){
  var rows=parseCSV(txt); if(rows.length<2){alert('CSV looks empty.');return;}
  var head=rows[0].map(function(h){return (''+h).toLowerCase().trim();});
  function col(){for(var a=0;a<arguments.length;a++){var k=arguments[a];for(var j=0;j<head.length;j++)if(head[j].indexOf(k)>=0)return j;}return -1;}
  // Cash-pay wellness — no insurance/billing columns needed. Just chart · initials · line · date.
  var ci={id:col('chart','encounter','visit','record','mrn','id'),pt:col('initial','patient','name','member'),dos:col('dos','date of service','service date','date'),line:col('line','service','program','type','category')};
  var enc=rows.slice(1).map(function(r,idx){
    return {id:(ci.id>=0?r[ci.id]:'')||('ENC-'+(idx+1)),pt:(ci.pt>=0?r[ci.pt]:'')||'—',dos:(ci.dos>=0?r[ci.dos]:'')||'',line:(ci.line>=0?normLine(r[ci.line]):(S.hdr.line||'iv')),risk:0,flags:[]};
  }).filter(function(e){return e.id;});
  S.encounters=enc; S.selected=[]; S.review={}; save(); S.stage=2; render();
}
// ---- drag chart → vision/Sonnet extract (chart #, initials, line, date) ----
// extractInto: attach the dropped note to an EXISTING chart slot and vision-parse its metadata.
function extractInto(id,file){
  if(!file||!id)return;
  fileToB64(file).then(function(b64){
    S.review[id]=S.review[id]||{};S.review[id].note={image:b64,name:file.name};
    var e0=encById(id);if(e0){e0.parsing=true;e0.blank=false;e0.err=null;}
    save();render();
    var body={mode:'extract',doc:{image:b64},clinic_id:(sess.clinicId||null)};
    var call=(window.AllyOSCloud&&AllyOSCloud.postAuthed)?AllyOSCloud.postAuthed('/.netlify/functions/governance-parse',body):fetch('/.netlify/functions/governance-parse',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
    var done=false;
    var TO=setTimeout(function(){if(done)return;done=true;var e=encById(id);if(e&&e.parsing){e.parsing=false;e.err='Timed out — re-drop or ✕ to remove';}save();render();},75000);
    Promise.resolve(call).then(function(r){return r.json();}).then(function(d){
      if(done)return;done=true;clearTimeout(TO);
      var e=encById(id);if(!e)return;
      e.parsing=false;
      if(!d||d.error){e.err=(d&&(d.detail||d.error))||'Could not read';save();render();return;}
      if((''+(d.name||'')).trim())e.name=(''+d.name).trim();
      if((''+(d.initials||'')).trim())e.pt=(''+d.initials).trim();
      else if(e.name&&(!e.pt||e.pt==='—'||e.pt==='…'))e.pt=initialsOf(e.name);
      if((''+(d.line||'')).trim())e.line=normLine(d.line);
      if((''+(d.date||'')).trim())e.dos=(''+d.date).trim();
      var newId=(''+(d.chart_id||'')).trim();
      if(newId&&newId!==id&&!encById(newId)){
        S.review[newId]=S.review[id];delete S.review[id];
        var si=S.selected.indexOf(id);if(si>=0)S.selected[si]=newId;
        e.id=newId;
      }
      save();render();
    }).catch(function(){if(done)return;done=true;clearTimeout(TO);var e=encById(id);if(e){e.parsing=false;e.err='Could not reach the parser.';}save();render();});
  });
}
// extractDoc: a chart dragged onto the pool (Stage 1/2). If empty "skip" slots exist, fill the
// first one; otherwise create a new slot. Then vision-parse into it.
function extractDoc(file){
  if(!file)return;
  var blank=null;
  for(var i=0;i<S.encounters.length;i++){var e=S.encounters[i];if(e.blank&&!(S.review[e.id]&&S.review[e.id].note)&&!e.parsing){blank=e;break;}}
  if(blank){extractInto(blank.id,file);return;}
  var tmpId='ENC-'+(S.encounters.length+1)+'-'+Math.floor(Math.random()*1e6);
  S.encounters.push({id:tmpId,pt:'…',line:(S.hdr.line||'iv'),dos:'',risk:0,flags:[],parsing:true});
  // a dropped encounter is one the MD chose to audit — auto-select it (up to 5)
  if(S.selected.length<5&&S.selected.indexOf(tmpId)<0)S.selected.push(tmpId);
  save();render();
  extractInto(tmpId,file);
}
// startBlank: no roster — jump straight to 5 empty encounter slots and drop the notes in Stage 3.
function startBlank(){
  if(S.encounters.length&&!confirm('Start 5 blank encounter slots? This clears the current pool.'))return;
  var enc=[];for(var i=0;i<5;i++)enc.push({id:'ENC-'+(i+1),pt:'—',line:(S.hdr.line||'iv'),dos:'',risk:0,flags:[],blank:true});
  S.encounters=enc;S.selected=enc.map(function(e){return e.id;});S.review={};save();S.stage=3;render();
}

// ---- selection (random — unbiased audit; cash-pay wellness, no billing risk score) ----
function toggleSel(id){var k=S.selected.indexOf(id);if(k>=0)S.selected.splice(k,1);else if(S.selected.length<5)S.selected.push(id);save();render();}
function randomFive(){var pool=S.encounters.slice();if(!pool.length){alert('Drop encounter documents first (Stage 1).');return;}var idx=pool.map(function(_,i){return i;});for(var i=idx.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=idx[i];idx[i]=idx[j];idx[j]=t;}S.selected=idx.slice(0,Math.min(5,pool.length)).map(function(i){return pool[i].id;});save();render();}
function clearSel(){S.selected=[];save();render();}
function removeChart(id){var i=S.encounters.map(function(e){return e.id;}).indexOf(id);if(i>=0)S.encounters.splice(i,1);var s=S.selected.indexOf(id);if(s>=0)S.selected.splice(s,1);if(S.review[id])delete S.review[id];save();render();}
function clearPool(){if(S.encounters.length&&!confirm('Clear ALL encounters and start over?'))return;S.encounters=[];S.selected=[];S.review={};save();render();}
// clear a single chart back to a blank slot (keeps its place so you can re-drop the note)
function clearChart(id){if(!confirm('Clear this encounter\'s note and result so you can re-drop it?'))return;var e=encById(id);if(e){e.name='';e.pt='—';e.dos='';e.blank=true;e.err=null;e.parsing=false;}S.review[id]={};save();render();}
function encById(id){for(var i=0;i<S.encounters.length;i++)if(S.encounters[i].id===id)return S.encounters[i];return null;}

// ---- dual-doc AI review ----
function fileToB64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result);};r.onerror=rej;r.readAsDataURL(file);});}
function attach(id,which,input){if(!input.files||!input.files[0])return;var f=input.files[0];
  fileToB64(f).then(function(b64){S.review[id]=S.review[id]||{};S.review[id][which]={image:b64,name:f.name};save();render();});}
function runReview(id){
  var e=encById(id);var rv=S.review[id]||{};if(!rv.note){alert('Attach the progress note first.');return;}
  rv.busy=true;save();render();
  var body={mode:'dual',line:e.line,params:PARAMS[e.line]||PARAMS.iv,note:rv.note,clinic_id:(sess.clinicId||null)};
  var call=(window.AllyOSCloud&&AllyOSCloud.postAuthed)?AllyOSCloud.postAuthed('/.netlify/functions/governance-parse',body):fetch('/.netlify/functions/governance-parse',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  Promise.resolve(call).then(function(r){return r.json();}).then(function(d){
    S.review[id]=S.review[id]||{};S.review[id].busy=false;
    if(!d||d.error){S.review[id].err=(d&&(d.hint||d.detail||d.error))||'Review failed';save();render();return;}
    S.review[id].result=d;S.review[id].err=null;save();render();
  }).catch(function(){S.review[id].busy=false;S.review[id].err='Could not reach the reviewer.';save();render();});
}
function reviewedCount(){return S.selected.filter(function(id){return S.review[id]&&S.review[id].result;}).length;}

// ---- pattern flags across the sampled set ----
function patternFlags(){
  var out=[];var sel=S.selected.map(encById).filter(Boolean);
  // Cross-chart shared deficiencies (a systemic documentation gap, not a one-off).
  var counts={};S.selected.forEach(function(id){var r=S.review[id]&&S.review[id].result;if(r)(r.deficiencies||[]).forEach(function(x){var k=(''+x).replace(/^[^—:]*[—:]\s*/,'').toLowerCase().slice(0,44);counts[k]=(counts[k]||0)+1;});});
  Object.keys(counts).forEach(function(k){if(counts[k]>=2)out.push(counts[k]+' of '+sel.length+' encounters share a deficiency: '+k);});
  var pep=sel.filter(function(e){return e.line==='pep';}).length;
  if(pep>=2)out.push(pep+' peptide encounter(s) — confirm grade→consent-tier and an individualized POC per encounter');
  var fails=S.selected.filter(function(id){var r=S.review[id]&&S.review[id].result;return r&&r.status==='FAIL';}).length;
  if(fails)out.push(fails+' of '+sel.length+' encounters did not pass — corrective actions listed above');
  return out;
}
function sessionRating(){var f=0;S.selected.forEach(function(id){var r=S.review[id]&&S.review[id].result;if(r){f+=(r.deficiencies||[]).length;}});return {findings:f,rating:f?'ACTION REQ':'CLEAN'};}

// ============ RENDER ============
var STAGES=[{n:1,t:'Load Encounters'},{n:2,t:'Encounter Selection'},{n:3,t:'AI Review'},{n:4,t:'Summary'}];
function go(n){if(n===3&&S.selected.length<1)return;S.stage=n;save();render();}
function render(){
  document.getElementById('stages').innerHTML=STAGES.map(function(s){
    var cls=S.stage===s.n?'on':((s.n===1&&S.encounters.length)||(s.n===2&&S.selected.length)||(s.n===3&&reviewedCount())?'done':'');
    return '<div class="stg '+cls+'" onclick="go('+s.n+')"><span class="n">'+s.n+'</span>'+esc(s.t)+'</div>';
  }).join('');
  var v=document.getElementById('view');
  if(S.stage===1)v.innerHTML=stage1();
  else if(S.stage===2)v.innerHTML=stage2();
  else if(S.stage===3)v.innerHTML=stage3();
  else v.innerHTML=stage4();
}
// ---- Stage 1 ----
function stage1(){
  var h=S.hdr;

function setHdr(k,v){S.hdr[k]=v;save();}
function setStat(i,v){S.statutory[i]=(S.statutory[i]===v?'':v);save();render();}
// ---- Stage 2 ----

// ---- Stage 3 (dual-document inspection — mirrors AHCA AuditPro; Sonnet vision reads both docs) ----
var curChart=0;var _cleanOpen={};
function clearAllResults(){if(!confirm('Clear all AI results for this session? Attached documents stay.'))return;S.selected.forEach(function(id){if(S.review[id]){S.review[id].result=null;S.review[id].err=null;}});save();render();}
function swapChart(){var id=S.selected[curChart];var pool=S.encounters.filter(function(e){return S.selected.indexOf(e.id)<0;});if(!pool.length){alert('No other encounters in the pool to swap in — drop more on Stage 1.');return;}var pick=pool[Math.floor(Math.random()*pool.length)];S.selected[curChart]=pick.id;save();render();}
function toggleClean(id){_cleanOpen[id]=!_cleanOpen[id];render();}
function stage3(){
  if(curChart>=S.selected.length)curChart=0;
  var tabs=S.selected.map(function(id,i){var e=encById(id);var r=S.review[id]&&S.review[id].result;var cls=(i===curChart?'on ':'')+(r?(r.status==='PASS'?'pass':'fail'):'');
    return '<div class="ctab '+cls+'" onclick="curChart='+i+';render()">'+(r?(r.status==='PASS'?'✓ ':'⚠ '):'')+'Encounter '+(i+1)+' — '+esc(e?dispPt(e):'')+'</div>';}).join('');
  var id=S.selected[curChart];var e=encById(id);var rv=S.review[id]||{};var r=rv.result;
  var noteBox='<div style="flex:1"><label>Encounter note</label><div class="drop" style="padding:22px" ondragover="dh(event,1)" ondragleave="dh(event,0)" ondrop="dropDoc(event,\''+esc(id)+'\',\'note\')" onclick="pickDoc(\''+esc(id)+'\',\'note\')">'+(rv.note?('📄 '+esc(rv.note.name||'attached')):'<div class="ic">⬆</div><div style="margin-top:6px;font-size:12px">Drop the encounter note</div><div class="muted" style="font-size:11px">PDF or image</div>')+'</div></div>';
  // Chart header — name, DOS · line, verdict badge, Clear & Re-run
  var head='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;border-top:1px solid var(--line);padding-top:12px;margin-top:6px">'+
    '<div><div style="font-weight:800">Encounter '+(curChart+1)+' — '+esc(e?dispPt(e):'')+'</div>'+
      '<div class="muted" style="font-size:12px;margin-top:2px">DOS: '+esc(e?(e.dos||'—'):'—')+' · <span class="flag">'+esc(e?(e.line||'').toUpperCase():'')+'</span> · '+esc(e?e.id:'')+'</div></div>'+
    '<div style="display:flex;gap:8px;align-items:center">'+(r?'<span class="verdict '+(r.status==='PASS'?'pass':'fail')+'">'+r.status+'</span>':'<span class="verdict pend">NOT REVIEWED</span>')+
      (r?'<button class="btn ghost" style="padding:5px 11px;font-size:11px" onclick="runReview(\''+esc(id)+'\')">↻ Clear &amp; Re-run</button>':'')+'</div></div>';
  var result='';
  if(rv.busy)result='<div class="note">Reading the documents…</div>';
  else if(rv.err)result='<div class="findbox def">'+esc(rv.err)+'</div>';
  else if(r){
    var nd=(r.deficiencies||[]).length,ncl=(r.clean||[]).length;
    result='<div class="kpis" style="grid-template-columns:repeat(2,1fr)"><div class="kpi red"><div class="v">'+nd+'</div><div class="muted" style="font-size:10px">Deficiencies</div></div><div class="kpi green"><div class="v">'+ncl+'</div><div class="muted" style="font-size:10px">Clean Fields</div></div></div>'+
      (narr(r.narrative)?'<div class="findbox">'+esc(narr(r.narrative))+'</div>':'')+
      (r.deficiencies||[]).map(function(x){return '<div class="findbox def">⚠ '+esc(x)+'</div>';}).join('')+
      (ncl?'<div class="findbox" style="cursor:pointer" onclick="toggleClean(\''+esc(id)+'\')"><b style="color:var(--green)">'+(_cleanOpen[id]?'▾':'▸')+' CLEAN FIELDS ('+ncl+')</b> <span class="muted">— click to '+(_cleanOpen[id]?'collapse':'expand')+'</span>'+(_cleanOpen[id]?'<div style="margin-top:8px">'+(r.clean||[]).map(function(x){return '<div style="color:var(--green);font-size:12px;margin:3px 0">✓ '+esc(x)+'</div>';}).join('')+'</div>':'')+'</div>':'')+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:10px;flex-wrap:wrap"><span style="font-size:12.5px;color:'+(nd?'var(--gold)':'var(--green)')+'">'+(nd?('⚠ Encounter '+(curChart+1)+' — '+nd+' deficiency(ies) to correct'):('✓ Encounter '+(curChart+1)+' — No deficiencies'))+'</span>'+
        (curChart<S.selected.length-1?'<button class="btn gold" onclick="curChart++;render()">Next Encounter →</button>':'<button class="btn gold" onclick="go(4)">Proceed to Summary →</button>')+'</div>';
  }
  return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">'+
      '<div class="grp" style="margin:0">Stage 3 · encounter inspection · '+reviewedCount()+'/'+S.selected.length+' complete</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn ghost" style="padding:6px 12px;font-size:12px" onclick="clearAllResults()">↻ Clear All AI Results</button><button class="btn ghost" style="padding:6px 12px;font-size:12px" onclick="swapChart()">⇄ Swap an encounter</button>'+(reviewedCount()>=S.selected.length?'<button class="btn gold" style="padding:6px 12px;font-size:12px" onclick="go(4)">All Encounters Done → Summary</button>':'')+'</div></div>'+
    '<div class="tabrow" style="margin-top:10px">'+tabs+'</div>'+
    head+
    '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px">'+noteBox+'</div>'+
    '<div style="margin-top:12px"><button class="btn gold" onclick="runReview(\''+esc(id)+'\')"'+(rv.busy?' disabled':'')+'>'+(r?'↻ Re-analyze':'▶ Analyze with AI')+'</button>'+
      (rv.note||r?'<button class="btn ghost" style="margin-left:8px;padding:8px 12px;font-size:12px" onclick="clearChart(\''+esc(id)+'\')">✕ Clear encounter</button>':'')+
      '<span class="muted" style="font-size:11px;margin-left:10px">'+(rv.note?'📄 Note attached — click Analyze to review it.':'Drop the encounter note above to start.')+'</span></div>'+
    result+
    '</div>'+
    '<div class="navrow"><button class="btn ghost" onclick="go(2)">← Selection</button><button class="btn go" onclick="go(4)"'+(reviewedCount()<1?' disabled':'')+'>Summary →</button></div>';
}
var _dropTarget=null;
function dh(ev,on){ev.preventDefault();ev.currentTarget.classList.toggle('hi',!!on);}
function dropDoc(ev,id,which){ev.preventDefault();ev.currentTarget.classList.remove('hi');var f=ev.dataTransfer.files&&ev.dataTransfer.files[0];if(!f)return;extractInto(id,f);}
function pickDoc(id,which){_dropTarget={id:id,which:which};var inp=document.getElementById('docPick');inp.value='';inp.click();}
// ---- Stage 4 ----
function stage4(){
  var rt=sessionRating();var pats=patternFlags();
  var results=S.selected.map(function(id,i){var e=encById(id);var r=S.review[id]&&S.review[id].result;
    return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div><b>'+(i+1)+'. '+esc(e?dispPt(e):'')+'</b> <span class="muted" style="font-size:11px">'+esc(e?e.id:'')+' · '+esc(e?e.dos:'')+' · '+esc(e?(e.line||'').toUpperCase():'')+'</span></div><span class="verdict '+(r?(r.status==='PASS'?'pass':'fail'):'pend')+'">'+(r?r.status:'NOT REVIEWED')+'</span></div>'+
      (r?('<div class="muted" style="font-size:12.5px;margin-top:8px">'+esc(narr(r.narrative))+'</div>'+
        (r.deficiencies||[]).map(function(x){return '<div class="findbox def" style="margin-top:6px">⚠ '+esc(x)+'</div>';}).join('')+
        (!(r.deficiencies||[]).length?'<div style="color:var(--green);font-size:12px;margin-top:6px">✓ Clean — no deficiencies</div>':'')):'')+
      '</div>';}).join('');
  return '<div class="card" style="border-color:'+(rt.findings?'#4a3c18':'#1e6e4a')+'"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="grp" style="margin:0">Session rating</div><div style="font-family:var(--fdisp);font-size:1.4rem;color:'+(rt.findings?'var(--gold)':'var(--green)')+'">'+rt.rating+'</div></div><div style="text-align:right"><div style="font-family:var(--fdisp);font-size:1.6rem;color:'+(rt.findings?'#f0857d':'var(--green)')+'">'+rt.findings+'</div><div class="muted" style="font-size:10px">Total findings</div></div></div></div>'+
    '<div class="grp">Encounter results</div>'+results+
    (pats.length?'<div class="card"><div class="grp" style="color:var(--gold)">Auto-detected pattern flags · set-wide</div>'+pats.map(function(p){return '<div class="pf">⚠ '+esc(p)+'</div>';}).join('')+'</div>':'')+
    '<div class="card"><div class="grp">Finish</div>'+
      '<div style="max-width:300px;margin-bottom:12px"><label>Report date '+(S.hdr.date?'':'<span style="color:#f0857d">— required</span>')+'</label><input type="date" value="'+esc(S.hdr.date||'')+'" oninput="setHdr(\'date\',this.value)"><div class="muted" style="font-size:10.5px;margin-top:4px">Prints as the binder\'s Report Date (also settable on Stage 1).</div></div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap">'+
      '<button class="btn gold" onclick="previewPDF()">📄 Preview / download report</button>'+
      '<button class="btn go" onclick="signArchive()">🔒 Sign &amp; archive</button>'+
      '<span class="muted" style="font-size:11.5px;align-self:center">Sends to the per-clinic audit log; download the PDF to email the clinic.</span></div></div>'+
    '<div class="navrow"><button class="btn ghost" onclick="go(3)">← Review</button><button class="btn ghost" onclick="if(confirm(\'Start a new inspection? Current data clears.\')){S={stage:1,statutory:{},encounters:[],selected:[],review:{},hdr:{clinic:sess.clinic||\'\'}};save();render();}">＋ New inspection</button></div>';
}
// ---- report + archive ----
function buildPayload(){
  var rt=sessionRating();
  // Active service lines are the ones actually seen in the reviewed encounters (§VI).
  var LINE_LABEL={iv:'IV / IM Therapy',pep:'Peptide Therapy',bhrt:'BHRT / HRT'};
  var seen={};S.selected.forEach(function(id){var e=encById(id);if(e&&e.line)seen[e.line]=true;});
  var allDef=S.selected.reduce(function(a,id){var r=S.review[id]&&S.review[id].result;if(r)a=a.concat(r.deficiencies||[]);return a;},[]).join(' | ').toLowerCase();
  var lines=Object.keys(seen).map(function(ln){
    return {title:(LINE_LABEL[ln]||ln.toUpperCase())+' — active this period',
      items:(PARAMS[ln]||[]).map(function(p){return {label:p,status:(allDef.indexOf(p.toLowerCase().slice(0,14))>=0?'Missing':'Present')};})};
  });
  // §I Active/Unencumbered License — the clinic's licensed practitioners (MD-of-record + APPs/RNs).
  var POS={MD:'Medical Director',DO:'Medical Director',ARNP:'ARNP · Nurse Practitioner',APRN:'ARNP · Nurse Practitioner',NP:'Nurse Practitioner',PA:'Physician Assistant',RN:'Registered Nurse'};
  var roster=(window.AllyOSCred&&AllyOSCred.roster&&AllyOSCred.roster())||[];
  var practitioners=roster.filter(function(s){return (s.status||'active')!=='inactive';}).map(function(s){
    return [s.name||'—',(POS[(s.cred||'').toUpperCase().replace(/[^A-Z]/g,'')]||s.cred||'Provider'),(s.license||s.state_license||'—'),'Active'];
  });
  return {clinic:S.hdr.clinic,reportDate:fmtDate(S.hdr.date),practitioners:practitioners,md:(window.AllyOSAuth&&AllyOSAuth.greeting&&AllyOSAuth.greeting())||sess.name||'Medical Director',mdLicense:'Florida Medical License · ME 84789',
    overall:rt.findings?'Needs correction':'Compliant',
    charts:S.selected.map(function(id){var e=encById(id);var r=S.review[id]&&S.review[id].result;return {ref:e?e.id:'',ini:e?e.pt:'',dos:e?e.dos:'',line:(e?e.line:'').toUpperCase(),status:r?r.status:'Not reviewed'};}),
    lines:lines,corrections:S.selected.reduce(function(acc,id){var e=encById(id);var r=S.review[id]&&S.review[id].result;if(r){(r.deficiencies||[]).forEach(function(x){acc.push({label:(e?e.pt:'')+' — '+x,resp:'Clinic provider',due:''});});}return acc;},[]),
    priorCorrections:[]};
}
function previewPDF(){if(!window.AllyOSGovReport){alert('Report module not loaded.');return;}AllyOSGovReport.download(buildPayload()).catch(function(e){alert('Report error: '+(e&&e.message||e));});}
// ---- Reprint a previously signed & archived report (no re-review needed) ----
function archPayload(rec){
  var POS={MD:'Medical Director',DO:'Medical Director',ARNP:'ARNP · Nurse Practitioner',APRN:'ARNP · Nurse Practitioner',NP:'Nurse Practitioner',PA:'Physician Assistant',RN:'Registered Nurse'};
  var LINE_LABEL={iv:'IV / IM Therapy',pep:'Peptide Therapy',bhrt:'BHRT / HRT'};
  var roster=(window.AllyOSCred&&AllyOSCred.roster&&AllyOSCred.roster())||[];
  var practitioners=roster.filter(function(s){return (s.status||'active')!=='inactive';}).map(function(s){return [s.name||'—',(POS[(s.cred||'').toUpperCase().replace(/[^A-Z]/g,'')]||s.cred||'Provider'),(s.license||s.state_license||'—'),'Active'];});
  var charts=(rec.charts||[]).map(function(c){return {ref:c.ref||'',ini:c.ini||'',dos:c.dos||'',line:(c.line||'').toUpperCase(),status:c.status||'Reviewed'};});
  var seen={};charts.forEach(function(c){if(c.line)seen[c.line.toLowerCase()]=true;});
  var lines=Object.keys(seen).map(function(ln){return {title:(LINE_LABEL[ln]||ln.toUpperCase())+' — active this period',items:(PARAMS[ln]||[]).map(function(p){return {label:p,status:'Present'};})};});
  var corrections=[];(rec.charts||[]).forEach(function(c){(c.deficiencies||[]).forEach(function(x){corrections.push({label:(c.ini||'')+' — '+x,resp:'Clinic provider',due:''});});});
  return {clinic:rec.clinic,reportDate:fmtDate(rec.report_date)||fmtDate((''+(rec.created_at||'')).slice(0,10)),practitioners:practitioners,
    md:(window.AllyOSAuth&&AllyOSAuth.greeting&&AllyOSAuth.greeting())||sess.name||'Medical Director',mdLicense:'Florida Medical License · ME 84789',
    overall:rec.findings?'Needs correction':'Compliant',charts:charts,lines:lines,corrections:corrections,priorCorrections:[]};
}
function reprintArchived(){
  if(!(window.AllyOSCloud&&AllyOSCloud._sb)){alert('Cloud not available — sign in to load saved reports.');return;}
  var name=S.hdr.clinic||sess.clinic||'';
  var q=AllyOSCloud._sb.from('governance_inspections').select('*').order('created_at',{ascending:false}).limit(24);
  if(sess.clinicId)q=q.eq('clinic_id',sess.clinicId);else if(name)q=q.eq('clinic',name);
  Promise.resolve(q).then(function(r){var rows=(r&&r.data)||[];if(!rows.length){alert('No signed reports on file'+(name?(' for '+name):'')+' yet.');return;}archModal(rows);}).catch(function(){alert('Could not load saved reports.');});
}
function archModal(rows){
  window._archRows=rows;
  var body=rows.map(function(rec,i){var d=fmtDate(rec.report_date)||fmtDate((''+(rec.created_at||'')).slice(0,10));var nc=(rec.charts||[]).length;
    return '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;border-top:1px solid var(--line);padding:10px 0"><div><b>'+esc(rec.clinic||'')+'</b><div class="muted" style="font-size:11.5px">'+esc(d)+' · '+esc(rec.rating||'')+' · '+nc+' encounter'+(nc===1?'':'s')+' · '+(rec.findings||0)+' finding'+((rec.findings||0)===1?'':'s')+'</div></div><button class="btn gold" style="padding:7px 12px" onclick="archDownload('+i+')">📄 Download binder</button></div>';
  }).join('');
  var ov=document.createElement('div');ov.id='archOv';ov.style.cssText='position:fixed;inset:0;background:rgba(3,8,15,.75);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML='<div class="card" style="max-width:560px;width:100%;max-height:80vh;overflow:auto"><div style="display:flex;justify-content:space-between;align-items:center"><div class="grp" style="margin:0">Signed reports on file</div><button class="btn ghost" style="padding:4px 10px" onclick="var o=document.getElementById(\'archOv\');if(o)o.remove()">✕</button></div>'+body+'</div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function archDownload(i){var rec=(window._archRows||[])[i];if(!rec)return;if(!window.AllyOSGovReport){alert('Report module not loaded.');return;}AllyOSGovReport.download(archPayload(rec)).catch(function(e){alert('Report error: '+(e&&e.message||e));});}

<input type="file" id="docPick" accept="image/*,.pdf" style="display:none">
<script>
document.getElementById('csvPick').addEventListener('change',function(){var f=this.files&&this.files[0];if(!f)return;var r=new FileReader();r.onload=function(){ingestCSV(r.result);};r.readAsText(f);this.value='';});
document.getElementById('chartPick').addEventListener('change',function(){var fs=this.files;if(!fs||!fs.length)return;for(var i=0;i<fs.length;i++)extractDoc(fs[i]);this.value='';});
document.getElementById('docPick').addEventListener('change',function(){var f=this.files&&this.files[0];if(!f||!_dropTarget)return;extractInto(_dropTarget.id,f);this.value='';});
// page-level drag: works on ANY stage. CSV → roster ingest; chart docs (pdf/image) → vision extract.
// Must preventDefault on dragover regardless of stage, else the browser opens the file instead of dropping.
(function(){var d=document.body;function zone(){return document.getElementById('drop')||document.getElementById('drop2');}
  d.addEventListener('dragover',function(e){e.preventDefault();var t=zone();if(t)t.classList.add('hi');});
  d.addEventListener('dragleave',function(e){if(e.relatedTarget)return;var t=zone();if(t)t.classList.remove('hi');});
  d.addEventListener('drop',function(e){e.preventDefault();var t=zone();if(t)t.classList.remove('hi');
    var fs=e.dataTransfer.files;if(!fs||!fs.length)return;
    // A dropped chart lands in the pool — if we're still on Stage 1, move to Chart Selection so it's visible.
    var sawChart=false;
    for(var i=0;i<fs.length;i++){var f=fs[i];
      if(/\.csv$/i.test(f.name)||f.type==='text/csv'){var r=new FileReader();r.onload=(function(rr){return function(){ingestCSV(rr.result);};})(r);r.readAsText(f);}
      else {extractDoc(f);sawChart=true;}
    }
    if(sawChart&&S.stage===1){S.stage=2;save();render();}
  });
})();
</script>
