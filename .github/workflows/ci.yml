name: CI

on:
  pull_request:
    paths:
      - "app-bioaxisos/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "app-bioaxisos/**"

defaults:
  run:
    working-directory: app-bioaxisos

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    # Build/validation only — no secrets, no PHI. Env validation is skipped so the
    # gates run without production config; runtime accessors still require real values.
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app-bioaxisos/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
