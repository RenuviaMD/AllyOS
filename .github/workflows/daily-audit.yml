name: AllyOS monthly audit & health

# Master-Console agents. Runs MONTHLY (with the governance-binder rhythm) + on demand.
# Noise policy: citation / clinical-content / regulatory jobs are fail-SOFT (they update the
# cockpit queue but never send a red email). Only the Change Sentinel — real retraction /
# FDA-label / trial-halt events — is allowed to fail loud. Silence = nothing actionable.
on:
  schedule:
    - cron: '0 4 1 * *'     # 04:00 UTC on the 1st of each month
  workflow_dispatch: {}       # manual trigger from the Actions tab (the admin "Run now" button)
  push:                       # CI gate — also run on every push that touches AllyOS
    paths: ['allyos/**', 'protocols/**', 'netlify/**', 'scripts/**', '.github/workflows/daily-audit.yml']
  pull_request:
    paths: ['allyos/**', 'protocols/**', 'netlify/**', 'scripts/**']

permissions:
  contents: read

jobs:
  health:
    name: Debug / Health agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Audit codebase (JSON · inline JS · functions · calc · links · refs)
        run: python3 scripts/health-check.py
      - name: Upload status (read by the Master Console)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allyos-status
          path: allyos/admin-status.json

  # Operations Auditor — re-verifies clinical content (citations resolve, label
  # doses/contraindications current, no efficacy overclaim, advisory posture) via the
  # Claude API on Opus. Schedule + on-demand only (NOT every push — it costs API calls).
  # Requires the ANTHROPIC_API_KEY GitHub Actions secret (separate from Netlify's env).
  ops-audit:
    name: Operations Auditor (Opus) — clinical-content re-verification
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: health
    continue-on-error: true    # fail-SOFT: writes the cockpit queue, never sends a red email
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Re-verify clinical content (Opus)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/ops-audit.py
      - name: Commit the audit report (so the cockpit shows it)
        if: always()
        run: |
          git config user.name "allyos-bot"
          git config user.email "bot@renuviamd.com"
          git add allyos/ops-audit-status.json allyos/ops-audit-review-queue.csv || true
          git commit -m "ops-audit: clinical-content re-verification ($(date -u +%F))" || echo "no changes"
          git push || echo "push skipped"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-audit-report
          path: allyos/ops-audit-status.json

  # Protocol verifier — the PRODUCTIVITY auditor. Deterministic, NO API key: scopes to
  # PUBLISHED protocols only (not pending/draft), resolves every citation live
  # (DOI/PMID/NCT/journal) and auto-confirms the real ones, and reports what's new per
  # protocol. Only citations that FAIL to resolve reach the review queue.
  protocol-verify:
    name: Protocol verifier — published-scope citation check + what's-new
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: health
    continue-on-error: true    # fail-SOFT: an unresolved citation updates the cockpit queue, no red email
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Verify published protocols (live PubMed / ClinicalTrials)
        run: python3 scripts/protocol-verify.py
      - name: Commit the verification report
        if: always()
        run: |
          git config user.name "allyos-bot"
          git config user.email "bot@renuviamd.com"
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git add allyos/protocol-verify.json allyos/protocol-verify-queue.csv || true
          git commit -m "protocol-verify: published-scope citation check ($(date -u +%F))" || echo "no changes"
          git push || echo "push skipped"

  # Change Sentinel — DETERMINISTIC decision-change watch. NO LLM, no key. Watches only the
  # agents in our PUBLISHED protocols and flags ONLY facts that change a decision (retractions,
  # terminated trials, FDA label changes), each with a source link. Fail-closed; silence = clear.
  # This is the ONE job left hard-fail on purpose: a red run here = a real safety change to
  # something we recommend, and that is the only email worth waking up for.
  change-sentinel:
    name: Change Sentinel — deterministic decision-change watch
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: health
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Watch published-protocol decisions (PubMed / ClinicalTrials / openFDA)
        run: python3 scripts/change-sentinel.py
      - name: Commit the sentinel report + baselines
        if: always()
        run: |
          git config user.name "allyos-bot"
          git config user.email "bot@renuviamd.com"
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git add allyos/change-sentinel.json allyos/change-sentinel-queue.csv allyos/change-sentinel-state.json || true
          git commit -m "change-sentinel: deterministic decision-change watch ($(date -u +%F))" || echo "no changes"
          git push || echo "push skipped"

  # Regulatory radar — INFO ONLY (does not affect protocol logic). Federal Register API (free,
  # no key) for FDA peptide/compounding/PCAC activity; Florida lane is curated links.
  reg-radar:
    name: Regulatory radar (info only) — FDA peptide/compounding news
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: health
    continue-on-error: true    # fail-SOFT: info only, never sends a red email
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Pull FDA peptide/compounding news (Federal Register)
        run: python3 scripts/reg-radar.py
      - name: Commit the radar
        if: always()
        run: |
          git config user.name "allyos-bot"
          git config user.email "bot@renuviamd.com"
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git add allyos/reg-radar.json || true
          git commit -m "reg-radar: peptide/compounding regulatory news ($(date -u +%F))" || echo "no changes"
          git push || echo "push skipped"
